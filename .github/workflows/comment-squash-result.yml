name: Comment Squash Result

on:
  workflow_run:
    workflows: ["Verify Squashed Commits"]
    types:
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Download result
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: squash-check-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read result
        id: result
        shell: bash
        run: |
          IS_SQUASHED=$(cat is_squashed.txt)
          COMMIT_COUNT=$(cat commit_count.txt)
          PR_NUMBER=$(cat pr_number.txt)
          echo "is_squashed=$IS_SQUASHED" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: steps.result.outputs.is_squashed == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          COMMIT_COUNT: ${{ steps.result.outputs.commit_count }}
          MAX_COMMITS: 1
          PR_NUMBER: ${{ steps.result.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { COMMIT_COUNT, MAX_COMMITS, PR_NUMBER } = process.env;

            const body = `
            ### ⚠️ Squash Check Failed

            This Pull Request currently contains **${COMMIT_COUNT}** commits.
            To keep our history clean, we require a maximum of **${MAX_COMMITS}** commit(s) per PR.

            **How to fix this:**
            1. Squash your commits locally: \`git rebase -i HEAD~${COMMIT_COUNT}\`
            2. Force push the changes: \`git push --force-with-lease\`

            _This is an automated message from the Verify Squashed Commits check._
            `;

            github.rest.issues.createComment({
              issue_number: parseInt(PR_NUMBER),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.trim()
            })
